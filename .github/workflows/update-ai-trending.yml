name: 🤖 Update GitHub AI Trending

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape GitHub Trending (weekly + monthly)
        run: python scrape_trending.py
        env:
          SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _cached_weekly.html _cached_monthly.html scrape_trending.py data.json
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "🤖 Auto-update AI Trending ($(date -u '+%Y-%m-%d'))"
          git push

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
