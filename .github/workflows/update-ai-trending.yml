name: 🤖 Update GitHub AI Trending

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install scrapling jinja2

      - name: Scrape GitHub Trending (weekly + monthly)
        run: python scrape_trending.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html _cached_weekly.html _cached_monthly.html
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "🤖 Auto-update AI Trending ($(date -u '+%Y-%m-%d'))"
          git push
